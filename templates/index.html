<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOL GPT – Password</title>
<link rel="stylesheet" href="https://gaf.nyc/gafstandard.css">

  <style>
    body {
      font-family: 'Titillium Web', sans-serif;
      background-color: #000;
      color: #59DCFF;
      text-align: center;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }

    #bg-video {
      position: fixed;
      right: 0;
      bottom: 0;
      min-width: 100%;
      min-height: 100%;
      z-index: -1;
      object-fit: cover;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .logo {
      width: 300px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 2em;
      color: #fff;
      margin-bottom: 20px;
    }

    .section {
      background: rgba(0, 0, 0, 0.7);
      padding: 30px;
      border: 2px solid #59DCFF;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      animation: fadeIn 2s ease forwards;
      opacity: 0;
    }

    .section.visible {
      opacity: 1;
    }

    h3 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    form input[type="password"] {
      padding: 10px;
      width: 80%;
      max-width: 300px;
      font-size: 1em;
      border: 2px solid #59DCFF;
      background: #000;
      color: #fff;
      margin-bottom: 15px;
    }

    form input[type="submit"] {
      padding: 10px 20px;
      font-size: 1em;
      background: #59DCFF;
      border: none;
      color: #000;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    form input[type="submit"]:hover {
      background: #00FFFF;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <video autoplay loop muted playsinline id="bg-video" preload="auto">
    <source src="https://gaf.nyc/shorten.mp4" type="video/mp4">
  </video>

  <div class="container">
    <img src="https://gaf.nyc/BGtitle.svg" alt="BG Logo" class="logo" />
    <h2>SOL GPT</h2>

    <div class="section">
      <h3>🔐 What's the Password?</h3>
      <form method="POST">
        <input type="password" name="password" placeholder="ENTER PASSWORD" required><br>
        <input type="submit" value="SUBMIT">
      </form>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const sections = document.querySelectorAll('.section');
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.2 });
      sections.forEach(section => observer.observe(section));
    });
  </script>
</body>
</html>
