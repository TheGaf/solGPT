<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SOL AI</title>

  <!-- Google font -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600&display=swap" />

  <link rel="stylesheet" href="https://gaf.nyc/gaf_solstandards.css" />

  <style>
    .blinking-cursor {
      font-weight: bold;
      color: #59DCFF;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }
    .send-btn {
      width: 100px;
      margin-left: auto;
      display: block;
    }
  </style>
   <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <div class="header">
      <img src="https://gaf.nyc/sol_v1.png" alt="SOL AI" class="logo" />
      <a href="https://gaf.nyc" target="_blank" rel="noopener">
        <img src="https://gaf.nyc/BGtitle.svg" alt="BG Logo" class="logo" />
      </a>
    </div>

    <div class="input-block">
      <label>
        <input type="checkbox" id="toggleSources" checked />
        Show Sources
      </label>
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-block">
      <textarea id="inputBox" class="input-text"
                placeholder="Type your message…" autocomplete="off"></textarea>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const chat      = document.getElementById('chat');
    const inputBox  = document.getElementById('inputBox');
    const sendBtn   = document.getElementById('sendBtn');
    const toggleSrc = document.getElementById('toggleSources');

    function addMessage(msg, cls, time = null, isHTML = false) {
      const b = document.createElement('div');
      b.className = 'bubble ' + cls;
      if (isHTML) b.innerHTML = msg;
      else        b.textContent = msg;
      chat.appendChild(b);
      if (cls === 'sol' && time) {
        const t = document.createElement('div');
        t.className = 'timecode';
        t.textContent = time;
        chat.appendChild(t);
      }
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = inputBox.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      inputBox.value = '';
      chat.scrollTop = chat.scrollHeight;

      const thinking = document.createElement('div');
      thinking.className = 'bubble sol';
      thinking.innerHTML = '<span class="blinking-cursor">&gt; thinking…</span>';
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      let res;
      try {
        res = await fetch('/chat/api', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            show_sources: toggleSrc.checked
          }),
          redirect: 'manual'
        });
      } catch (netErr) {
        console.error('Network error', netErr);
        thinking.remove();
        addMessage('⚠️ Could not connect to server.', 'sol');
        return;
      }

      // If redirect or non-200, force logout & re-auth
      const ctype = res.headers.get('Content-Type') || '';
      if (res.status === 302 || res.redirected || res.status !== 200 || !ctype.includes('application/json')) {
        console.warn('Unexpected response, logging out:', res.status, ctype);
        window.location.href = '/chat/logout';
        return;
      }

      const payload = await res.json();
      thinking.remove();

      if (!res.ok) {
        console.error('Chat API error', payload);
        addMessage('⚠️ ' + (payload.error || 'Server error'), 'sol');
        return;
      }

      const now = new Date().toLocaleTimeString([], {
        hour:   '2-digit',
        minute: '2-digit'
      });
      // new: render Markdown when payload.html is raw text
      const raw = payload.html || payload.reply;
      const html = payload.html 
        ? raw 
        : marked.parse(raw);

      addMessage(html, 'sol', now, true);

    }

    sendBtn.addEventListener('click', sendMessage);
    inputBox.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
