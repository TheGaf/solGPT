
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SOL GPT</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Titillium Web', sans-serif;
      background-color: #121212;
      color: #FFFFFF;
      text-align: left;
      padding: 20px;
      margin: 0;
    }
    #bg-video {
      position: fixed;
      right: 0;
      bottom: 0;
      min-width: 100%;
      min-height: 100%;
      z-index: -1;
      opacity: 1;
    }
    .container {
      max-width: 270px;
      margin: auto;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    h2 {
      font-size: 18px;
      font-weight: 700;
      color: #FFFFFF;
      text-align: center;
      margin-bottom: 20px;
    }
    .chat-box {
      background: rgba(0, 0, 0, 0.75);
      border-radius: 10px;
      max-height: 300px;
      min-height: 300px;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 12px;
    }
    .bubble {
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 10px;
      font-size: 14px;
    }
    .user {
      background-color: #59DCFF;
      color: #000;
    }
    .sol {
      background-color: #111;
      color: #0f0;
    }
    .timecode {
      font-size: 10px;
      color: #aaa;
      margin-top: 2px;
    }
    .input-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    input[type="text"], input[type="file"] {
      padding: 10px;
      font-size: 14px;
      font-family: 'Titillium Web', sans-serif;
      border-radius: 5px;
      border: none;
    }
    button {
      background-color: #59DCFF;
      color: #fff;
      border: none;
      padding: 10px 16px;
      font-weight: 700;
      font-family: 'Titillium Web', sans-serif;
      border-radius: 5px;
      cursor: pointer;
    }
    .logo {
      width: 100%;
      max-width: 90px;
      display: block;
      margin: 20px auto 0 auto;
      animation: slowBlink 0.75s infinite alternate;
    }
    @keyframes slowBlink {
      0% { filter: brightness(1); }
      100% { filter: brightness(2); }
    }
    ::placeholder {
      color: #ccc;
    }
  
    input[type="file"]::file-selector-button {
      background-color: #ff69b4;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      font-family: 'Titillium Web', sans-serif;
      cursor: pointer;
    }
    </style>
    
</head>
<body>
  <video autoplay loop muted playsinline id="bg-video">
    <source src="https://gaf.nyc/cloud.mp4" type="video/mp4">
  </video>
  <div class="container">
    <h2>SOL GPT</h2>
    <div class="chat-box" id="chat"></div>
    <div class="input-block">
      <input type="text" id="inputBox" placeholder="Type your message..." autocomplete="off">
      <input type="file" id="fileUpload" class="pink-file-button" />
      <button onclick="sendMessage()">Send</button>
    </div>
    <p style="text-align:center;">
      <a href="https://gaf.nyc" target="_blank"><img src="https://gaf.nyc/BGtitle.svg" alt="BG Logo" class="logo" /></a>
    </p>
  </div>
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('inputBox');

    function addMessage(msg, className, time = null) {
      const div = document.createElement('div');
      div.className = `bubble ${className}`;
      div.textContent = msg;
      chat.appendChild(div);
      if (className === "sol" && time) {
        const timeDiv = document.createElement('div');
        timeDiv.className = "timecode";
        timeDiv.textContent = time;
        chat.appendChild(timeDiv);
      }
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const msg = input.value.trim();
      const file = document.getElementById("fileUpload").files[0];
      if (!msg && !file) return;
      if (msg) addMessage(msg, 'user');
      input.value = '';

      const formData = new FormData();
      formData.append("query", msg);
      if (file) formData.append("file", file);

      try {
        const res = await fetch('/query', { method: 'POST', body: formData });
        const data = await res.json();
        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        addMessage(data.response.replace(/<[^>]*>/g, ''), 'sol', now);
      } catch (e) {
        addMessage("Error: Could not connect to server.", 'sol');
      }
    }

    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
