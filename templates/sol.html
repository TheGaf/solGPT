<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SOL AI</title>

  <!-- Google font -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600&display=swap" />

  <link rel="stylesheet" href="https://gaf.nyc/gaf_solstandards.css" />

  <style>
    /* blinking "thinking…" cursor effect */
    .blinking-cursor {
      font-weight: bold;
      color: #59DCFF;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    /* right-align the Send button */
    .send-btn {
      width: 100px;
      margin-left: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- header -->
    <div class="header">
      <img src="https://gaf.nyc/sol_v1.png" alt="SOL AI" class="logo" />
      <a href="https://gaf.nyc" target="_blank" rel="noopener">
        <img src="https://gaf.nyc/BGtitle.svg" alt="BG Logo" class="logo" />
      </a>
    </div>

    <!-- toggle sources -->
    <div class="input-block">
      <label>
        <input type="checkbox" id="toggleSources" checked />
        Show Sources
      </label>
    </div>

    <!-- chat history -->
    <div class="chat-box" id="chat"></div>

    <!-- input area -->
    <div class="input-block">
      <textarea id="inputBox" class="input-text"
                placeholder="Type your message…" autocomplete="off"></textarea>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>

<script>
  const chat       = document.getElementById('chat');
  const inputBox   = document.getElementById('inputBox');
  const sendBtn    = document.getElementById('sendBtn');
  const toggleSrc  = document.getElementById('toggleSources');

  function addMessage(msg, cls, time = null, isHTML = false) {
    const b = document.createElement('div');
    b.className = 'bubble ' + cls;
    if (isHTML) b.innerHTML = msg;
    else        b.textContent = msg;
    chat.appendChild(b);

    if (cls === 'sol' && time) {
      const t = document.createElement('div');
      t.className = 'timecode';
      t.textContent = time;
      chat.appendChild(t);
    }
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const text = inputBox.value.trim();
    if (!text) return;

    // show user message
    addMessage(text, 'user');
    inputBox.value = '';
    chat.scrollTop = chat.scrollHeight;

    // show thinking cursor
    const thinking = document.createElement('div');
    thinking.className = 'bubble sol';
    thinking.innerHTML = '<span class="blinking-cursor">&gt; thinking…</span>';
    chat.appendChild(thinking);
    chat.scrollTop = chat.scrollHeight;

    try {
      const res = await fetch('/chat/api', {
        method: 'POST',
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: text,
          show_sources: toggleSrc.checked
        })
      });

      const data = await res.json();
      thinking.remove();

      if (!res.ok) {
        console.error('Chat error', data);
        addMessage('⚠️ ' + (data.error || 'Server error'), 'sol');
        return;
      }

      const now = new Date().toLocaleTimeString([], {
        hour:   '2-digit',
        minute: '2-digit'
      });

      // display the assistant’s reply
      addMessage(data.html || data.reply, 'sol', now, true);

    } catch (err) {
      thinking.remove();
      console.error('Network error', err);
      addMessage('⚠️ Could not connect to server.', 'sol');
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  inputBox.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
