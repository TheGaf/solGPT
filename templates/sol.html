<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SOL AI</title>

  <!-- Google font -->
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600&display=swap" />

  <link rel="stylesheet" href="https://gaf.nyc/gaf_solstandards.css" />

  <!-- These extra bits until you merge them upstream: -->
  <style>
    /* hide the native file input behind our pink "+" button */
    .input-buttons > input[type="file"] {
      display: none;
    }

    /* show the chosen filename next to "+" in small grey text */
    #fileNameDisplay {
      font-size: 0.9em;
      color: #ccc;
      max-width: 150px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* blinking "thinking…" cursor effect */
    .blinking-cursor {
      font-weight: bold;
      color: #59DCFF;
      animation: blink 1s step-start infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- header -->
    <div class="header">
      <img src="https://gaf.nyc/sol_v1.png" alt="SOL AI" class="logo" />
      <a href="https://gaf.nyc" target="_blank" rel="noopener">
        <img src="https://gaf.nyc/BGtitle.svg" alt="BG Logo" class="logo" />
      </a>
    </div>

    <!-- toggle sources -->
    <div class="input-block">
      <label>
        <input type="checkbox" id="toggleSources" checked />
        Show Sources
      </label>
    </div>

    <!-- chat history -->
    <div class="chat-box" id="chat"></div>

    <!-- input area -->
    <div class="input-block">
      <textarea id="inputBox" class="input-text"
                placeholder="Type your message…" autocomplete="off">
      </textarea>
      <div class="input-buttons">
        <label for="fileUpload" class="upload-btn">+</label>
        <input type="file" id="fileUpload" name="file" accept="image/*" />
        <span id="fileNameDisplay"></span>
        <button class="send-btn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

<script>
  const chat            = document.getElementById('chat');
  const input           = document.getElementById('inputBox');
  const fileInput       = document.getElementById('fileUpload');
  const fileNameDisplay = document.getElementById('fileNameDisplay');

  // Show selected filename
  fileInput.addEventListener('change', () => {
    fileNameDisplay.textContent = fileInput.files.length
      ? fileInput.files[0].name
      : '';
  });

  function addMessage(msg, cls, time = null, isHTML = false) {
    const b = document.createElement('div');
    b.className = 'bubble ' + cls;
    if (isHTML) b.innerHTML = msg;
    else        b.textContent = msg;
    chat.appendChild(b);
    if (cls === 'sol' && time) {
      const t = document.createElement('div');
      t.className = 'timecode';
      t.textContent = time;
      chat.appendChild(t);
    }
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const msg  = input.value.trim();
    const file = fileInput.files[0];
    if (!msg && !file) return;

    if (msg) addMessage(msg, 'user');
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = e => {
        addMessage(
          `<img src="${e.target.result}" style="max-width:100%;border-radius:6px;margin:6px 0;">`,
          'user',
          null,
          true
        );
      };
      reader.readAsDataURL(file);
    }

    // clear inputs
    input.value = '';
    fileInput.value = '';
    fileNameDisplay.textContent = '';

    // prepare payload
    const toggle = document.getElementById('toggleSources');
    const fd = new FormData();
    if (msg)  fd.append('message', msg);
    if (file) fd.append('file', file);
    fd.append('show_sources', toggle.checked);

    // show blinking "thinking…" cursor
    const c = document.createElement('div');
    c.className = 'bubble sol';
    c.innerHTML = '<span class="blinking-cursor">&gt; thinking…</span>';
    chat.appendChild(c);
    chat.scrollTop = chat.scrollHeight;

    try {
      // POST to the same-origin /chat endpoint
      const res = await fetch('/chat', {
        method: 'POST',
        body: fd
      });

      const data = await res.json();
      const now  = new Date().toLocaleTimeString([], {
        hour:   '2-digit',
        minute: '2-digit'
      });

      c.remove();
      addMessage(data.reply, 'sol', now, true);

    } catch (e) {
      c.remove();
      addMessage('⚠️ Could not connect to server.', 'sol');
    }
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
</html>
